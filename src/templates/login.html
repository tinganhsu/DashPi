<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }} - Login</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/main.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: var(--bg-card); padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        input[type="password"] { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); box-sizing: border-box; font-size: 1rem; }
        .error { color: #ff4d4d; margin-bottom: 1rem; }
        .btn { width: 100%; }
    </style>
</head>
<body class="theme-light">
    <div class="login-card">
        <h1>DashPi Login</h1>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <input type="password" name="password" placeholder="Admin Password" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</body>
</html>
