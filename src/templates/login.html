<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }} - Login</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/main.css') }}">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-hover: linear-gradient(135deg, #5a6fd6 0%, #694291 100%);
        }
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            background: var(--bg-body, #f4f7f6);
            font-family: 'Jost', sans-serif;
        }
        .login-card { 
            background: var(--bg-card, #ffffff); 
            padding: 2.5rem; 
            border-radius: 1.5rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            transition: transform 0.3s ease;
        }
        h1 { margin-bottom: 2rem; color: var(--text-color, #333); font-weight: 600; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        input[type="password"] { 
            width: 100%; 
            padding: 0.85rem 1rem; 
            border-radius: 0.75rem; 
            border: 2px solid var(--border-color, #eee); 
            box-sizing: border-box; 
            font-size: 1rem; 
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .error { 
            color: #ff4d4d; 
            margin-bottom: 1.5rem; 
            background: rgba(255, 77, 77, 0.1);
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
        }
        .btn-modern { 
            width: 100%; 
            padding: 0.85rem;
            border: none;
            border-radius: 0.75rem;
            background: var(--primary-gradient);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            background: var(--primary-hover);
        }
        .btn-modern:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="theme-light">
    <div class="login-card">
        <h1>DashPi Login</h1>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <input type="password" name="password" placeholder="Admin Password" required autofocus>
            </div>
            <button type="submit" class="btn-modern">Login</button>
        </form>
    </div>
</body>
</html>
