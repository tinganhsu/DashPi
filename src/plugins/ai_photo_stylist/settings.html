{% if vibes_error %}
<div class="form-group">
    <div style="color: #d32f2f; font-size: 0.9em; line-height: 1.4;">
        {{ vibes_error }}
    </div>
</div>
{% endif %}

<div class="form-group">
    <label for="imageUpload" class="form-input file-upload-label" id="uploadLabel">Choose Photo</label>
    <input type="file" id="imageUpload" accept="image/*" multiple
           class="file-upload-input" onchange="uploadFiles()">
</div>

<div id="uploadProgress" style="display: none;" class="form-group">
    <div id="uploadStatus" style="color: var(--text-secondary, #888); font-size: 0.9em; padding: 8px 0;"></div>
</div>

<div class="form-group">
    <div id="fileListHeader" style="display: none; justify-content: space-between; align-items: center; margin-bottom: 4px;">
        <span style="font-size: 0.85em; color: var(--text-secondary, #888);" id="fileCount"></span>
        <button type="button" onclick="clearAllFiles()"
            style="background: none; border: none; color: #f44336; font-size: 0.8em; font-weight: 600; cursor: pointer; padding: 2px 6px;">
            Clear All
        </button>
    </div>
    <div id="fileNames" class="file-name-list"></div>
</div>

<div id="hiddenFileInputs"></div>

<div class="form-group">
    <label for="sourceImagePath" class="form-label">Source Photo</label>
    <select id="sourceImagePath" name="sourceImagePath" class="form-input"></select>
</div>

<div class="form-group">
    <label for="randomizePhoto" class="form-label">Random Photo:</label>
    <div class="toggle-container">
        <input type="hidden" name="randomizePhoto" value="false">
        <input type="checkbox" id="randomizePhoto" name="randomizePhoto" class="toggle-checkbox" value="true">
        <label for="randomizePhoto" class="toggle-label"></label>
    </div>
</div>

<div class="form-group">
    <label for="includeCachedInRandom" class="form-label">Include Cache in Random:</label>
    <div class="toggle-container">
        <input type="hidden" name="includeCachedInRandom" value="false">
        <input type="checkbox" id="includeCachedInRandom" name="includeCachedInRandom" class="toggle-checkbox" value="true">
        <label for="includeCachedInRandom" class="toggle-label"></label>
    </div>
    <small style="flex-basis: 100%; margin-top: 2px; color: var(--text-secondary, #888);">
        Cached images: {{ cached_image_count }}
    </small>
</div>

<div class="form-group">
    <div id="cachedFileListHeader" style="display: none; justify-content: space-between; align-items: center; margin-bottom: 4px;">
        <span style="font-size: 0.85em; color: var(--text-secondary, #888);" id="cachedFileCount"></span>
        <a id="downloadCachedButton" href="/plugin/ai_photo_stylist/download_cached"
           style="color: var(--accent-color, #2196f3); font-size: 0.8em; font-weight: 600; text-decoration: none; padding: 2px 6px;">
            Download All
        </a>
    </div>
    <div id="cachedFileNames" class="file-name-list"></div>
</div>

<div class="form-group">
    <label for="vibeId" class="form-label">Vibe</label>
    <select id="vibeId" name="vibeId" class="form-input">
        {% for vibe in vibes %}
        <option value="{{ vibe.id }}">{{ vibe.name }}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group">
    <label for="randomizeVibe" class="form-label">Random Vibe:</label>
    <div class="toggle-container">
        <input type="hidden" name="randomizeVibe" value="false">
        <input type="checkbox" id="randomizeVibe" name="randomizeVibe" class="toggle-checkbox" value="true">
        <label for="randomizeVibe" class="toggle-label"></label>
    </div>
</div>

<div class="form-group">
    <label for="customPrompt" class="form-label">Extra Prompt</label>
    <textarea id="customPrompt" name="customPrompt" class="form-input" rows="3"
              placeholder="Optional extra instruction"></textarea>
</div>

<div class="form-group">
    <label for="provider" class="form-label">AI Provider</label>
    <select id="provider" name="provider" class="form-input" onchange="toggleProviderOptions()">
        <option value="gemini">Google Gemini</option>
        <option value="openai">OpenAI</option>
    </select>
</div>

<div id="geminiOptions" class="form-group dropdown-container">
    <label for="geminiImageModel" class="form-label">Gemini Model</label>
    <select id="geminiImageModel" name="geminiImageModel" class="form-input">
        <option value="gemini-2.5-flash-image">Gemini 2.5 Flash Image</option>
        <option value="gemini-3-pro-image-preview">Gemini 3 Pro Image Preview</option>
        <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash Image Preview</option>
    </select>
</div>

<div id="openaiOptions" class="form-group dropdown-container" style="display: none;">
    <div class="form-group">
        <label for="openaiImageModel" class="form-label">OpenAI Model</label>
        <select id="openaiImageModel" name="openaiImageModel" class="form-input">
            <option value="gpt-image-2">GPT Image 2</option>
            <option value="gpt-image-1">GPT Image 1</option>
        </select>
    </div>
    <div class="form-group">
        <label for="openaiImageQuality" class="form-label">Quality</label>
        <select id="openaiImageQuality" name="openaiImageQuality" class="form-input">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
            <option value="auto">Auto</option>
        </select>
    </div>
</div>

<div class="form-group">
    <label for="fitMode" class="form-label">Fit Mode</label>
    <select id="fitMode" name="fitMode" class="form-input">
        <option value="fit">Fit (Letterbox)</option>
        <option value="fill">Fill (Crop)</option>
    </select>
</div>

<div class="form-group">
    <label for="showCaption" class="form-label">Show Caption:</label>
    <div class="toggle-container">
        <input type="hidden" name="showCaption" value="false">
        <input type="checkbox" id="showCaption" name="showCaption" class="toggle-checkbox" value="true">
        <label for="showCaption" class="toggle-label"></label>
    </div>
</div>

<script>
    const discoveredImages = {{ available_images | tojson }};
    const cachedImages = {{ cached_images | tojson }};
    let uploadsInProgress = 0;

    function toggleProviderOptions() {
        const provider = document.getElementById("provider").value;
        document.getElementById("geminiOptions").style.display = provider === "gemini" ? "flex" : "none";
        document.getElementById("openaiOptions").style.display = provider === "openai" ? "flex" : "none";
    }

    function fileNameFromPath(filePath) {
        return filePath.split('/').pop();
    }

    function fileDomId(fileName) {
        return encodeURIComponent(fileName).replace(/%/g, '_');
    }

    async function uploadFiles() {
        const fileInput = document.getElementById("imageUpload");
        const files = Array.from(fileInput.files);
        fileInput.value = "";
        if (!files.length) return;

        const progressDiv = document.getElementById("uploadProgress");
        const statusEl = document.getElementById("uploadStatus");
        const uploadLabel = document.getElementById("uploadLabel");
        progressDiv.style.display = "block";

        const newFiles = files.filter(f => !document.getElementById(`hidden-${fileDomId(f.name)}`));
        if (!newFiles.length) {
            statusEl.textContent = "All files already uploaded";
            setTimeout(() => { progressDiv.style.display = "none"; }, 2000);
            return;
        }

        uploadsInProgress = newFiles.length;
        uploadLabel.textContent = "Uploading...";

        for (let i = 0; i < newFiles.length; i++) {
            const file = newFiles[i];
            statusEl.textContent = `Uploading ${i + 1} / ${newFiles.length}: ${file.name}`;
            try {
                const formData = new FormData();
                formData.append('file', file);
                const resp = await fetch('/plugin/ai_photo_stylist/upload_image', { method: 'POST', body: formData });
                const data = await resp.json();
                uploadsInProgress--;
                if (data.success) {
                    addFileToList(data.file_name, data.file_path, false);
                } else {
                    statusEl.textContent = `Error uploading ${file.name}: ${data.error}`;
                }
            } catch (err) {
                uploadsInProgress--;
                statusEl.textContent = `Failed: ${file.name} - ${err.message}`;
            }
        }

        statusEl.textContent = `${newFiles.length} photo(s) uploaded`;
        uploadLabel.textContent = "Choose Photo";
        setTimeout(() => { progressDiv.style.display = "none"; }, 2500);
        autoSaveFileList();
    }

    function autoSaveFileList() {
        const filePaths = getCurrentFilePaths();
        fetch('/plugin/ai_photo_stylist/save_image_list', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_paths: filePaths })
        }).catch(err => console.error('Auto-save file list failed:', err));
    }

    function getCurrentFilePaths() {
        return Array.from(document.querySelectorAll('#hiddenFileInputs input[name="imageFiles[]"]'))
            .map(input => input.value);
    }

    function addFileToList(fileName, filePath, missing) {
        const domId = fileDomId(fileName);
        if (document.getElementById(`hidden-${domId}`)) return;

        const fileNamesDisplay = document.getElementById("fileNames");
        const hiddenFileInputs = document.getElementById("hiddenFileInputs");

        const fileElement = document.createElement("div");
        fileElement.id = `existing-${domId}`;
        fileElement.classList.add("file-name");
        if (missing) fileElement.style.opacity = '0.6';

        const nameEl = document.createElement("span");
        nameEl.id = "fileNameText";
        nameEl.textContent = fileName;
        fileElement.appendChild(nameEl);
        if (missing) {
            const badge = document.createElement("span");
            badge.style.color = "#f44336";
            badge.style.fontSize = "12px";
            badge.style.fontWeight = "600";
            badge.style.marginLeft = "6px";
            badge.title = "File not found on disk";
            badge.textContent = "missing";
            fileElement.appendChild(badge);
        }
        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "remove-btn";
        removeButton.textContent = "X";
        removeButton.addEventListener("click", () => removeExistingFile(fileName));
        fileElement.appendChild(removeButton);
        fileNamesDisplay.appendChild(fileElement);

        const hiddenInput = document.createElement("input");
        hiddenInput.type = "hidden";
        hiddenInput.name = "imageFiles[]";
        hiddenInput.value = filePath;
        hiddenInput.id = `hidden-${domId}`;
        hiddenFileInputs.appendChild(hiddenInput);

        updateFileListHeader();
        rebuildSourceDropdown(filePath);
    }

    function removeExistingFile(fileName) {
        const domId = fileDomId(fileName);
        const hidden = document.getElementById(`hidden-${domId}`);
        const filePath = hidden ? hidden.value : '';
        const el = document.getElementById(`existing-${domId}`);
        if (el) el.remove();
        if (hidden) hidden.remove();

        if (filePath) {
            fetch('/plugin/ai_photo_stylist/delete_image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_path: filePath })
            }).catch(err => console.error('Delete failed:', err));
        }

        updateFileListHeader();
        rebuildSourceDropdown();
        autoSaveFileList();
    }

    function clearAllFiles() {
        const paths = getCurrentFilePaths();
        if (!paths.length) return;
        if (!confirm(`Remove all ${paths.length} photo(s)?`)) return;

        document.getElementById('fileNames').innerHTML = '';
        document.getElementById('hiddenFileInputs').innerHTML = '';
        paths.forEach(filePath => {
            fetch('/plugin/ai_photo_stylist/delete_image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_path: filePath })
            }).catch(err => console.error('Delete failed:', err));
        });
        updateFileListHeader();
        rebuildSourceDropdown();
        autoSaveFileList();
    }

    function addCachedFileToList(fileName, filePath) {
        const domId = fileDomId(fileName);
        if (document.getElementById(`cached-${domId}`)) return;

        const fileNamesDisplay = document.getElementById("cachedFileNames");
        const fileElement = document.createElement("div");
        fileElement.id = `cached-${domId}`;
        fileElement.classList.add("file-name");

        const nameEl = document.createElement("span");
        nameEl.id = "fileNameText";
        nameEl.textContent = fileName;
        fileElement.appendChild(nameEl);

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "remove-btn";
        removeButton.textContent = "X";
        removeButton.addEventListener("click", () => removeCachedFile(fileName, filePath));
        fileElement.appendChild(removeButton);
        fileNamesDisplay.appendChild(fileElement);

        updateCachedFileListHeader();
    }

    function removeCachedFile(fileName, filePath) {
        const domId = fileDomId(fileName);
        const el = document.getElementById(`cached-${domId}`);
        if (el) el.remove();

        fetch('/plugin/ai_photo_stylist/delete_image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_path: filePath })
        }).catch(err => console.error('Delete cached image failed:', err));

        updateCachedFileListHeader();
    }

    function updateCachedFileListHeader() {
        const count = document.querySelectorAll('#cachedFileNames .file-name').length;
        const header = document.getElementById('cachedFileListHeader');
        const countEl = document.getElementById('cachedFileCount');
        if (count > 0) {
            header.style.display = 'flex';
            countEl.textContent = `${count} cached photo${count !== 1 ? 's' : ''}`;
        } else {
            header.style.display = 'none';
        }
    }

    function updateFileListHeader() {
        const count = getCurrentFilePaths().length;
        const header = document.getElementById('fileListHeader');
        const countEl = document.getElementById('fileCount');
        if (count > 0) {
            header.style.display = 'flex';
            countEl.textContent = `${count} photo${count !== 1 ? 's' : ''}`;
        } else {
            header.style.display = 'none';
        }
    }

    function rebuildSourceDropdown(preferredPath) {
        const dropdown = document.getElementById('sourceImagePath');
        const previousValue = preferredPath || dropdown.value;
        const paths = getCurrentFilePaths();
        dropdown.innerHTML = '';

        if (!paths.length) {
            dropdown.add(new Option('Upload a photo first', ''));
            return;
        }

        paths.forEach(path => dropdown.add(new Option(fileNameFromPath(path), path)));
        if (paths.includes(previousValue)) {
            dropdown.value = previousValue;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        cachedImages.forEach(item => addCachedFileToList(item.name, item.path));

        let existingFiles = discoveredImages.map(item => item.path);
        if (loadPluginSettings && pluginSettings['imageFiles[]']) {
            existingFiles = pluginSettings['imageFiles[]'];
        }
        if (!Array.isArray(existingFiles)) existingFiles = [existingFiles];

        const addExistingFiles = (existsMap = {}) => {
            existingFiles.forEach(filePath => {
                if (!filePath) return;
                addFileToList(fileNameFromPath(filePath), filePath, existsMap[filePath] === false);
            });
            const savedSource = loadPluginSettings ? pluginSettings.sourceImagePath : '';
            rebuildSourceDropdown(savedSource);
        };

        if (existingFiles.length) {
            fetch('/plugin/ai_photo_stylist/check_files', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_paths: existingFiles })
            })
            .then(resp => resp.json())
            .then(addExistingFiles)
            .catch(() => addExistingFiles({}));
        } else {
            rebuildSourceDropdown();
        }

        if (loadPluginSettings) {
            document.getElementById('customPrompt').value = pluginSettings.customPrompt || '';
            document.getElementById('provider').value = pluginSettings.provider || 'gemini';
            document.getElementById('randomizePhoto').checked = pluginSettings.randomizePhoto === 'true';
            document.getElementById('includeCachedInRandom').checked = pluginSettings.includeCachedInRandom === 'true';
            document.getElementById('randomizeVibe').checked = pluginSettings.randomizeVibe === 'true';
            document.getElementById('geminiImageModel').value = pluginSettings.geminiImageModel || 'gemini-2.5-flash-image';
            document.getElementById('openaiImageModel').value = pluginSettings.openaiImageModel || 'gpt-image-2';
            document.getElementById('openaiImageQuality').value = pluginSettings.openaiImageQuality || 'medium';
            document.getElementById('fitMode').value = pluginSettings.fitMode || 'fit';
            document.getElementById('showCaption').checked = pluginSettings.showCaption === 'true';
            if (pluginSettings.vibeId) {
                document.getElementById('vibeId').value = pluginSettings.vibeId;
            }
        }
        toggleProviderOptions();
    });
</script>
